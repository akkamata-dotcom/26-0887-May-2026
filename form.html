<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register with Us - Bus Booking</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Bus Booking</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Register with us</h2>
    <p>All fields are required — please don't leave anything blank.</p>
    <hr />

    <form id="contactForm" class="contact-form" novalidate>

      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" />
        <span class="form-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" />
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" name="phone" placeholder="+254 712 345 678" />
        <span class="form-error" id="phoneError"></span>
      </div>

      <div class="form-group">
        <label for="gender">Gender *</label>
        <select id="gender" name="gender">
          <option value="">-- Select Gender --</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="non-binary">Non-binary</option>
          <option value="prefer_not_to_say">Prefer not to say</option>
        </select>
        <span class="form-error" id="genderError"></span>
      </div>

      <button type="submit" class="form-btn">Register</button>

      <div class="form-success" id="successBanner" style="display:none;">
        ✅ Thank you! You have been registered successfully.
      </div>

    </form>
  </main>

  <footer>
    <p>&copy; 2026 Bus Booking. All rights reserved.</p>
    <p>
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="contact.html">Contact</a>
    </p>
  </footer>

  <script>
    var form = document.getElementById('contactForm');

    function setError(inputEl, errorEl, message) {
      inputEl.classList.add('input-error');
      inputEl.classList.remove('shake');
      void inputEl.offsetWidth;
      inputEl.classList.add('shake');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function clearError(inputEl, errorEl) {
      inputEl.classList.remove('input-error', 'shake');
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    }

    function validateName(showErrors) {
      var input = document.getElementById('name');
      var errorEl = document.getElementById('nameError');
      var val = input.value.trim();
      if (val === '') {
        if (showErrors) setError(input, errorEl, "Please don't leave this blank — enter your full name.");
        return false;
      }
      if (val.length < 2) {
        if (showErrors) setError(input, errorEl, 'Name is too short. Please enter at least 2 characters.');
        return false;
      }
      clearError(input, errorEl);
      return true;
    }

    function validateEmail(showErrors) {
      var input = document.getElementById('email');
      var errorEl = document.getElementById('emailError');
      var val = input.value.trim();
      if (val === '') {
        if (showErrors) setError(input, errorEl, "Please don't leave this blank — enter your email address.");
        return false;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        if (showErrors) setError(input, errorEl, "That doesn't look like a valid email. Please check and try again.");
        return false;
      }
      clearError(input, errorEl);
      return true;
    }

    function validatePhone(showErrors) {
      var input = document.getElementById('phone');
      var errorEl = document.getElementById('phoneError');
      var val = input.value.trim();
      var digits = val.replace(/[\s\-().+]/g, '');
      if (val === '') {
        if (showErrors) setError(input, errorEl, "Please don't leave this blank — enter your phone number.");
        return false;
      }
      if (!/^\d{7,15}$/.test(digits)) {
        if (showErrors) setError(input, errorEl, 'Please enter a valid phone number (7–15 digits).');
        return false;
      }
      clearError(input, errorEl);
      return true;
    }

    function validateGender(showErrors) {
      var input = document.getElementById('gender');
      var errorEl = document.getElementById('genderError');
      if (input.value === '') {
        if (showErrors) setError(input, errorEl, "Please don't leave this blank — select a gender option.");
        return false;
      }
      clearError(input, errorEl);
      return true;
    }

    document.getElementById('name').addEventListener('blur', function () { validateName(true); });
    document.getElementById('name').addEventListener('input', function () {
      if (document.getElementById('name').classList.contains('input-error')) validateName(true);
    });

    document.getElementById('email').addEventListener('blur', function () { validateEmail(true); });
    document.getElementById('email').addEventListener('input', function () {
      if (document.getElementById('email').classList.contains('input-error')) validateEmail(true);
    });

    document.getElementById('phone').addEventListener('blur', function () { validatePhone(true); });
    document.getElementById('phone').addEventListener('input', function () {
      if (document.getElementById('phone').classList.contains('input-error')) validatePhone(true);
    });

    document.getElementById('gender').addEventListener('change', function () { validateGender(true); });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var n  = validateName(true);
      var em = validateEmail(true);
      var ph = validatePhone(true);
      var g  = validateGender(true);
      if (!n || !em || !ph || !g) return;

      document.getElementById('successBanner').style.display = 'block';
      form.reset();
      ['name', 'email', 'phone', 'gender'].forEach(function (id) {
        document.getElementById(id).classList.remove('input-error');
      });
    });
  </script>

</body>
</html>
